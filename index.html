<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Scorebug Pro - Complete Match Center</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://w3.org' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23000f45'/%3E%3Ctext y='.9em' x='50%25' font-size='70' font-weight='900' text-anchor='middle' fill='white' font-family='Arial'%3EQ%3C/text%3E%3C/svg%3E">
    <style>
        :root { --bg: #eef2f7; --card: white; --text: #000f45; --shadow: rgba(0,0,0,0.1); }
        body.dark-mode { --bg: #0b0e14; --card: #1a1e26; --text: #ffffff; --shadow: rgba(0,0,0,0.5); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; transition: 0.3s; }
        
        /* 1. NOWE LOGO */
        .site-logo { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; background: var(--card); padding: 15px 25px; border-radius: 12px; box-shadow: 0 4px 15px var(--shadow); border-left: 6px solid #0044cc; }
        .q-box { width: 50px; height: 50px; background: #000f45; border-radius: 10px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; border: 2px solid #0044cc; }
        .q-text { color: white; font-weight: 900; font-size: 28px; z-index: 2; }
        .logo-text { display: flex; flex-direction: column; line-height: 1.2; }
        .logo-title { font-weight: 900; font-size: 24px; color: #000f45; text-transform: uppercase; }
        .logo-sub { font-size: 13px; color: #0044cc; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }

        /* SCOREBUG */
        #scorebug { display: flex; align-items: center; background: #000f45; color: white; width: fit-content; padding: 5px; border-bottom: 8px solid #0044cc; box-shadow: 0 10px 30px var(--shadow); font-size: 45px; border-radius: 4px; }
        .box { padding: 20px 35px; text-align: center; min-width: 90px; outline: none; white-space: nowrap; overflow: hidden; }
        .team { background: #001e8c; font-weight: bold; border-right: 2px solid #002db3; text-transform: uppercase; }
        .score { background: #ffffff; color: #000; font-weight: 900; min-width: 50px; border-left: 1px solid #ccc; height: 65px; display: flex; align-items: center; justify-content: center; }
        .time { background: #000a30; font-size: 40px; color: #fff; min-width: 130px; border-left: 2px solid #001e8c; }

        /* PANEL KONTROLNY */
        .main-panel { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px var(--shadow); margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn { padding: 12px 25px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; font-size: 16px; }
        .btn-goal { background: #0044cc; color: white; }
        .btn-timer { background: #28a745; color: white; }
        .btn-reset { background: #dc3545; color: white; }
        .btn-mode { background: #6c757d; color: white; }

        /* STATYSTYKI I LISTA ZAWODNIKÓW */
        .stats-container { display: flex; gap: 20px; margin-top: 30px; width: 100%; max-width: 950px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px var(--shadow); flex: 1; text-align: center; }
        
        /* 4. RZUTY ROŻNE */
        .corner-box { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px 0; font-weight: bold; }
        .corner-val { background: #eee; padding: 5px 15px; border-radius: 5px; color: #000; min-width: 30px; }
        .btn-c { width: 30px; height: 30px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; color: white; }
        .plus { background: #28a745; }
        .minus { background: #dc3545; }

        /* 2. EDYTOWALNI PIŁKARZE */
        .player-input-area { display: flex; gap: 5px; margin-bottom: 15px; }
        .p-in { flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #ccc; outline: none; }
        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .player-name { flex: 1; text-align: left; font-weight: 500; }

        /* 3. KARTKI */
        .cards-area { display: flex; gap: 5px; }
        .card { width: 18px; height: 26px; border-radius: 3px; cursor: pointer; border: 1px solid rgba(0,0,0,0.2); opacity: 0.3; transition: 0.3s; }
        .y { background: #ffd700; }
        .r { background: #ff4d4d; }
        .card.active { opacity: 1; box-shadow: 0 0 8px rgba(0,0,0,0.3); border: 2px solid white; }
        
        .delete-p { cursor: pointer; color: #ccc; margin-left: 10px; font-size: 12px; }
        .delete-p:hover { color: red; }
    </style>
</head>
<body id="mainBody">

    <!-- 1. LOGO -->
    <div class="site-logo">
        <div class="q-box"><span class="q-text">Q</span></div>
        <div class="logo-text">
            <span class="logo-title" id="logoTitle">ScoreBug</span>
            <span class="logo-sub">QUALIFIERS SYSTEM</span>
        </div>
    </div>

    <!-- SCOREBUG -->
    <div id="scorebug">
        <div class="box team" contenteditable="true" spellcheck="false" id="t1n">SWE</div>
        <div class="box score" contenteditable="true" spellcheck="false" id="s1">0</div>
        <div class="box score" contenteditable="true" spellcheck="false" id="s2">0</div>
        <div class="box team" contenteditable="true" spellcheck="false" id="t2n">POL</div>
        <div class="box time" contenteditable="true" spellcheck="false" id="timerDisplay">00:00</div>
    </div>

    <!-- PANEL PRZYCISKÓW -->
    <div class="main-panel">
        <button class="btn btn-goal" onclick="addGoal(1)">+1 GOL</button>
        <button class="btn btn-timer" onclick="toggleTimer()" id="btnStart">START / STOP</button>
        <button class="btn btn-goal" onclick="addGoal(2)">+1 GOL</button>
        <button class="btn btn-reset" onclick="resetAll()">RESET</button>
        <button class="btn btn-mode" onclick="document.body.classList.toggle('dark-mode')">🌙/☀️ MODE</button>
    </div>

    <!-- 2, 3, 4. STATYSTYKI -->
    <div class="stats-container">
        <!-- DRUŻYNA 1 -->
        <div class="stat-card">
            <h3 id="t1l">SWE Statystyki</h3>
            <div class="corner-box">
                Rzuty rożne: <button class="btn-c minus" onclick="addCorner(1, -1)">-</button>
                <span class="corner-val" id="c1">0</span>
                <button class="btn-c plus" onclick="addCorner(1, 1)">+</button>
            </div>
            <div class="player-input-area">
                <input type="text" id="pi1" class="p-in" placeholder="Nazwisko piłkarza...">
                <button onclick="addPlayer(1)" class="btn-c plus" style="width:auto; padding:0 10px;">DODAJ</button>
            </div>
            <div id="list1"></div>
        </div>

        <!-- DRUŻYNA 2 -->
        <div class="stat-card">
            <h3 id="t2l">POL Statystyki</h3>
            <div class="corner-box">
                Rzuty rożne: <button class="btn-c minus" onclick="addCorner(2, -1)">-</button>
                <span class="corner-val" id="c2">0</span>
                <button class="btn-c plus" onclick="addCorner(2, 1)">+</button>
            </div>
            <div class="player-input-area">
                <input type="text" id="pi2" class="p-in" placeholder="Nazwisko piłkarza...">
                <button onclick="addPlayer(2)" class="btn-c plus" style="width:auto; padding:0 10px;">DODAJ</button>
            </div>
            <div id="list2"></div>
        </div>
    </div>

    <script>
        let seconds = 0; let timerInterval = null;

        // 4. RZUTY ROŻNE Z OCHRONĄ PRZED -1
        function addCorner(team, val) {
            let el = document.getElementById('c' + team);
            let current = parseInt(el.innerText);
            if (current + val >= 0) el.innerText = current + val;
        }

        // 2. DODAWANIE PIŁKARZY
        function addPlayer(team) {
            const input = document.getElementById('pi' + team);
            const name = input.value.trim();
            if (!name) return;
            
            const list = document.getElementById('list' + team);
            const row = document.createElement('div');
            row.className = 'player-row';
            row.innerHTML = `
                <span class="player-name">${name}</span>
                <div class="cards-area">
                    <div class="card y" onclick="toggleCard(this, 'y')"></div>
                    <div class="card y" onclick="toggleCard(this, 'y')"></div>
                    <div class="card r" onclick="toggleCard(this, 'r')"></div>
                    <span class="delete-p" onclick="this.parentElement.parentElement.remove()">X</span>
                </div>
            `;
            list.appendChild(row);
            input.value = "";
        }

        // 3. LOGIKA KARTEK (2 żółte = czerwona)
        function toggleCard(el, type) {
            el.classList.toggle('active');
            
            if (type === 'y') {
                const row = el.parentElement;
                const yellows = row.querySelectorAll('.card.y.active').length;
                const redCard = row.querySelector('.card.r');
                
                if (yellows >= 2) {
                    redCard.classList.add('active');
                } else if (yellows < 2 && !redCard.getAttribute('manual-red')) {
                    redCard.classList.remove('active');
                }
            }
            
            if (type === 'r') {
                if (el.classList.contains('active')) el.setAttribute('manual-red', 'true');
                else el.removeAttribute('manual-red');
            }
        }

        function addGoal(t) { 
            let s = document.getElementById('s' + t); 
            s.innerText = (parseInt(s.innerText.trim()) || 0) + 1; 
        }

        function toggleTimer() {
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } 
            else {
                timerInterval = setInterval(() => {
                    seconds++;
                    let m = Math.floor(seconds / 60).toString().padStart(2, '0');
                    let s = (seconds % 60).toString().padStart(2, '0');
                    document.getElementById('timerDisplay').innerText = m + ":" + s;
                }, 1000);
            }
        }

        function resetAll() {
            seconds = 0; document.getElementById('timerDisplay').innerText = "00:00";
            document.getElementById('s1').innerText = "0"; document.getElementById('s2').innerText = "0";
            document.getElementById('c1').innerText = "0"; document.getElementById('c2').innerText = "0";
            document.getElementById('list1').innerHTML = ""; document.getElementById('list2').innerHTML = "";
            if(timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        }

        // Aktualizacja nazw nad statystykami
        setInterval(() => {
            document.getElementById('t1l').innerText = document.getElementById('t1n').innerText + " Statystyki";
            document.getElementById('t2l').innerText = document.getElementById('t2n').innerText + " Statystyki";
        }, 500);

        // Blokady liter i Entera
        document.querySelectorAll('.score, .time').forEach(el => {
            el.addEventListener('keypress', e => { if (!/[0-9:]/.test(e.key)) e.preventDefault(); });
            el.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); el.blur(); }});
        });
        // LOGIKA KARTEK (2 żółte = czerwona i żółte znikają)
function toggleCard(el, type) {
    const row = el.parentElement;
    const allYellows = row.querySelectorAll('.card.y');
    const redCard = row.querySelector('.card.r');

    if (type === 'y') {
        el.classList.toggle('active');
        const activeYellows = row.querySelectorAll('.card.y.active').length;
        
        if (activeYellows >= 2) {
            redCard.classList.add('active');
            allYellows.forEach(y => {
                y.classList.remove('active');
                y.style.visibility = 'hidden';
            });
        }
    }
    
    if (type === 'r') {
        el.classList.toggle('active');
        if (!el.classList.contains('active')) {
            allYellows.forEach(y => {
                y.style.visibility = 'visible';
                y.classList.remove('active');
            });
        }
    }
}

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Scorebug Pro - Complete Match Center</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://w3.org' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23000f45'/%3E%3Ctext y='.9em' x='50%25' font-size='70' font-weight='900' text-anchor='middle' fill='white' font-family='Arial'%3EQ%3C/text%3E%3C/svg%3E">
    <style>
        :root { --bg: #eef2f7; --card: white; --text: #000f45; --shadow: rgba(0,0,0,0.1); }
        body.dark-mode { --bg: #0b0e14; --card: #1a1e26; --text: #ffffff; --shadow: rgba(0,0,0,0.5); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; transition: 0.3s; }
        
        .site-logo { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; background: var(--card); padding: 15px 25px; border-radius: 12px; box-shadow: 0 4px 15px var(--shadow); border-left: 6px solid #0044cc; }
        .q-box { width: 50px; height: 50px; background: #000f45; border-radius: 10px; display: flex; align-items: center; justify-content: center; position: relative; border: 2px solid #0044cc; }
        .q-text { color: white; font-weight: 900; font-size: 28px; }
        .logo-text { display: flex; flex-direction: column; line-height: 1.2; }
        .logo-title { font-weight: 900; font-size: 24px; color: #000f45; text-transform: uppercase; }
        .logo-sub { font-size: 13px; color: #0044cc; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }

        /* SCOREBUG Z PASKIEM NA DOLE */
        .bug-wrapper { position: relative; width: fit-content; background: #000f45; padding: 5px; border-bottom: 8px solid #0044cc; box-shadow: 0 10px 30px var(--shadow); border-radius: 4px; overflow: hidden; }
        #scorebug { display: flex; align-items: center; color: white; font-size: 45px; }
        
        /* PASEK POSTĘPU - TERAZ NA CAŁEJ SZEROKOŚCI NA DOLE */
        #matchProgress { position: absolute; bottom: 0; left: 0; height: 6px; background: #00ccff; width: 0%; transition: width 1s linear; z-index: 10; box-shadow: 0 0 12px #00ccff; }

        .box { padding: 20px 35px; text-align: center; min-width: 90px; outline: none; white-space: nowrap; overflow: hidden; }
        .team { background: #001e8c; font-weight: bold; border-right: 2px solid #002db3; text-transform: uppercase; }
        .score { background: #ffffff; color: #000; font-weight: 900; min-width: 50px; border-left: 1px solid #ccc; height: 65px; display: flex; align-items: center; justify-content: center; }
        .time { background: #000a30; font-size: 40px; color: #fff; min-width: 130px; border-left: 2px solid #001e8c; }

        .main-panel { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px var(--shadow); margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn { padding: 12px 25px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; font-size: 16px; }
        .btn-goal { background: #0044cc; color: white; }
        .btn-timer { background: #28a745; color: white; }
        .btn-reset { background: #dc3545; color: white; }
        
        .stats-container { display: flex; gap: 20px; margin-top: 30px; width: 100%; max-width: 950px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px var(--shadow); flex: 1; text-align: center; }
        .corner-box { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px 0; font-weight: bold; }
        .corner-val { background: #eee; padding: 5px 15px; border-radius: 5px; color: #000; min-width: 30px; }
        .btn-c { width: 30px; height: 30px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; color: white; }
        .plus { background: #28a745; }
        .minus { background: #dc3545; }
        .player-input-area { display: flex; gap: 5px; margin-bottom: 15px; }
        .p-in { flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #ccc; outline: none; background: var(--bg); color: var(--text); }
        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .card { width: 18px; height: 26px; border-radius: 3px; cursor: pointer; border: 1px solid rgba(0,0,0,0.2); opacity: 0.2; transition: 0.3s; }
        .y { background: #ffd700; } .r { background: #ff4d4d; }
        .card.active { opacity: 1; box-shadow: 0 0 8px rgba(0,0,0,0.3); border: 2px solid white; }
        select { margin-top: 20px; padding: 12px; border-radius: 8px; border: 2px solid #0044cc; background: var(--card); color: var(--text); font-size: 16px; }
    </style>
</head>
<body>

    <div class="site-logo">
        <div class="q-box"><span class="q-text">Q</span></div>
        <div class="logo-text">
            <span class="logo-title">ScoreBug</span>
            <span class="logo-sub">QUALIFIERS SYSTEM</span>
        </div>
    </div>

    <!-- NOWY KONTENER Z PASKIEM -->
    <div class="bug-wrapper">
        <div id="scorebug">
            <div class="box team" contenteditable="true" spellcheck="false" id="t1n">SWE</div>
            <div class="box score" contenteditable="true" spellcheck="false" id="s1">0</div>
            <div class="box score" contenteditable="true" spellcheck="false" id="s2">0</div>
            <div class="box team" contenteditable="true" spellcheck="false" id="t2n">POL</div>
            <div class="box time" id="timerDisplay">00:00</div>
        </div>
        <!-- PASEK POSTĘPU -->
        <div id="matchProgress"></div>
    </div>

    <div class="main-panel">
        <button class="btn btn-goal" onclick="addGoal(1)" id="btnG1">+1 GOL</button>
        <button class="btn btn-timer" onclick="toggleTimer()" id="btnStart">START / STOP</button>
        <button class="btn btn-goal" onclick="addGoal(2)" id="btnG2">+1 GOL</button>
        <button class="btn btn-reset" onclick="resetAll()" id="btnReset">RESET</button>
        <button class="btn" style="background:#6c757d; color:white" onclick="document.body.classList.toggle('dark-mode')">🌙/☀️ MODE</button>
    </div>

    <select id="langPicker" onchange="updateUI()">
        <option value="pl">Polski 🇵🇱</option><option value="en">English 🇬🇧</option><option value="de">Deutsch 🇩🇪</option><option value="es">Español 🇪🇸</option><option value="it">Italiano 🇮🇹</option><option value="fr">Français 🇫🇷</option><option value="ru">Русский 🇷🇺</option><option value="zh">中文 🇨🇳</option><option value="ja">日本語 🇯🇵</option>
    </select>

    <div class="stats-container">
        <div class="stat-card">
            <h3 id="t1l">SWE Statystyki</h3>
            <div class="corner-box"><span id="ct1">Rzuty rożne</span>: <button class="btn-c minus" onclick="addCorner(1, -1)">-</button><span class="corner-val" id="c1">0</span><button class="btn-c plus" onclick="addCorner(1, 1)">+</button></div>
            <div class="player-input-area"><input type="text" id="pi1" class="p-in" placeholder="Nazwisko..."><button onclick="addPlayer(1)" class="btn-c plus" style="width:auto; padding:0 10px;" id="ab1">DODAJ</button></div>
            <div id="list1"></div>
        </div>
        <div class="stat-card">
            <h3 id="t2l">POL Statystyki</h3>
            <div class="corner-box"><span id="ct2">Rzuty rożne</span>: <button class="btn-c minus" onclick="addCorner(2, -1)">-</button><span class="corner-val" id="c2">0</span><button class="btn-c plus" onclick="addCorner(2, 1)">+</button></div>
            <div class="player-input-area"><input type="text" id="pi2" class="p-in" placeholder="Nazwisko..."><button onclick="addPlayer(2)" class="btn-c plus" style="width:auto; padding:0 10px;" id="ab2">DODAJ</button></div>
            <div id="list2"></div>
        </div>
    </div>

    <script>
        let seconds = 0; let timerInterval = null;
        const translations = {
            pl: { start: "START / STOP", goal: "+1 GOL", reset: "RESET", corners: "Rzuty rożne", add: "DODAJ", stats: "Statystyki", ph: "Nazwisko..." },
            en: { start: "START / STOP", goal: "+1 GOAL", reset: "RESET", corners: "Corners", add: "ADD", stats: "Stats", ph: "Name..." },
            de: { start: "START / STOP", goal: "+1 TOR", reset: "RESET", corners: "Eckbälle", add: "HINZUFÜGEN", stats: "Stats", ph: "Name..." },
            es: { start: "INICIAR / PARAR", goal: "+1 GOL", reset: "REINICIAR", corners: "Corners", add: "AÑADIR", stats: "Stats", ph: "Nombre..." },
            it: { start: "INIZIA / FERMA", goal: "+1 GOL", reset: "RESET", corners: "Angoli", add: "AGGIUNGI", stats: "Stats", ph: "Nome..." },
            fr: { start: "ARRÊTER", goal: "+1 BUT", reset: "RESET", corners: "Corners", add: "AJOUTER", stats: "Stats", ph: "Nom..." },
            ru: { start: "СТАРТ / СТОП", goal: "+1 ГОЛ", reset: "СБРОС", corners: "Угловые", add: "ДОБАВИТЬ", stats: "Стат", ph: "Фамилия..." },
            zh: { start: "开始/停止", goal: "+1 进球", reset: "重置", corners: "角球", add: "添加", stats: "统计", ph: "姓名..." },
            ja: { start: "スタート/停止", goal: "+1 ゴール", reset: "リreset", corners: "コーナー", add: "追加", stats: "統計", ph: "名前..." }
        };

        function updateUI() {
            const lang = document.getElementById('langPicker').value;
            const t = translations[lang];
            const n1 = document.getElementById('t1n').innerText;
            const n2 = document.getElementById('t2n').innerText;
            document.getElementById('btnStart').innerText = t.start;
            document.getElementById('btnReset').innerText = t.reset;
            document.getElementById('btnG1').innerText = t.goal + " (" + n1 + ")";
            document.getElementById('btnG2').innerText = t.goal + " (" + n2 + ")";
            document.getElementById('t1l').innerText = n1 + " " + t.stats;
            document.getElementById('t2l').innerText = n2 + " " + t.stats;
            document.getElementById('ct1').innerText = t.corners;
            document.getElementById('ct2').innerText = t.corners;
            document.getElementById('ab1').innerText = t.add;
            document.getElementById('ab2').innerText = t.add;
            document.getElementById('pi1').placeholder = t.ph;
            document.getElementById('pi2').placeholder = t.ph;
        }

        function addCorner(team, val) {
            let el = document.getElementById('c' + team);
            let current = parseInt(el.innerText);
            if (current + val >= 0) el.innerText = current + val;
        }

        function addPlayer(team) {
            const input = document.getElementById('pi' + team);
            const name = input.value.trim();
            if (!name) return;
            const list = document.getElementById('list' + team);
            const row = document.createElement('div');
            row.className = 'player-row';
            row.innerHTML = `<span class="player-name">${name}</span><div class="cards-area"><div class="card y" onclick="toggleCard(this, 'y')"></div><div class="card y" onclick="toggleCard(this, 'y')"></div><div class="card r" onclick="toggleCard(this, 'r')"></div><span class="delete-p" onclick="this.parentElement.parentElement.remove()">X</span></div>`;
            list.appendChild(row);
            input.value = "";
        }

        function toggleCard(el, type) {
            const row = el.parentElement;
            const allYellows = row.querySelectorAll('.card.y');
            const redCard = row.querySelector('.card.r');
            if (type === 'y') {
                el.classList.toggle('active');
                const activeY = row.querySelectorAll('.card.y.active').length;
                if (activeY >= 2) {
                    redCard.classList.add('active');
                    allYellows.forEach(y => { y.classList.remove('active'); y.style.display = 'none'; });
                }
            }
            if (type === 'r') {
                el.classList.toggle('active');
                if (!el.classList.contains('active')) {
                    allYellows.forEach(y => { y.style.display = 'block'; y.classList.remove('active'); });
                }
            }
        }

        function addGoal(t) { let s = document.getElementById('s' + t); s.innerText = (parseInt(s.innerText.trim()) || 0) + 1; updateUI(); }
        
        function toggleTimer() {
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } 
            else {
                timerInterval = setInterval(() => {
                    seconds++;
                    let m = Math.floor(seconds / 60).toString().padStart(2, '0');
                    let s = (seconds % 60).toString().padStart(2, '0');
                    document.getElementById('timerDisplay').innerText = m + ":" + s;
                    
                    // AKTUALIZACJA PASKA (90 min = 5400 sek)
                    let progress = (seconds / 5400) * 100;
                    document.getElementById('matchProgress').style.width = Math.min(progress, 100) + "%";
                }, 1000);
            }
        }

        function resetAll() {
            seconds = 0; document.getElementById('timerDisplay').innerText = "00:00";
            document.getElementById('matchProgress').style.width = "0%";
            document.getElementById('s1').innerText = "0"; document.getElementById('s2').innerText = "0";
            document.getElementById('c1').innerText = "0"; document.getElementById('c2').innerText = "0";
            document.getElementById('list1').innerHTML = ""; document.getElementById('list2').innerHTML = "";
            if(timerInterval) { clearInterval(timerInterval); timerInterval = null; }
            updateUI();
        }

        document.getElementById('t1n').addEventListener('input', updateUI);
        document.getElementById('t2n').addEventListener('input', updateUI);
        updateUI();
    </script>
</body>
</html>

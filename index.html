<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Scorebug Pro - Complete Match Center</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://w3.org' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23000f45'/%3E%3Ctext y='.9em' x='50%25' font-size='70' font-weight='900' text-anchor='middle' fill='white' font-family='Arial'%3EQ%3C/text%3E%3C/svg%3E">
    <style>
        :root { --bg: #eef2f7; --card: white; --text: #000f45; --shadow: rgba(0,0,0,0.1); }
        body.dark-mode { --bg: #0b0e14; --card: #1a1e26; --text: #ffffff; --shadow: rgba(0,0,0,0.5); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; transition: 0.3s; }
        
        .site-logo { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; background: var(--card); padding: 15px 25px; border-radius: 12px; box-shadow: 0 4px 15px var(--shadow); border-left: 6px solid #0044cc; }
        .q-box { width: 50px; height: 50px; background: #000f45; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: white; font-size: 28px; border: 2px solid #0044cc; }

        /* SCOREBUG Z POPRAWIONYM PASKIEM */
        .bug-container { position: relative; display: flex; align-items: center; background: #000f45; color: white; width: fit-content; padding: 5px; border-bottom: 8px solid #0044cc; box-shadow: 0 10px 30px var(--shadow); border-radius: 4px; overflow: hidden; }
        .box { padding: 20px 35px; text-align: center; min-width: 90px; outline: none; white-space: nowrap; overflow: hidden; font-size: 45px; }
        .team { background: #001e8c; font-weight: bold; border-right: 2px solid #002db3; text-transform: uppercase; }
        
        /* Animacja gola */
        .score { background: #ffffff; color: #000; font-weight: 900; min-width: 50px; border-left: 1px solid #ccc; height: 65px; display: flex; align-items: center; justify-content: center; transition: background 0.3s; }
        .goal-flash { background: #00ff00 !important; }

        .time { background: #000a30; font-size: 40px; color: #fff; min-width: 130px; border-left: 2px solid #001e8c; }

        /* PASEK POSTĘPU - ŚWIECĄCY */
        #matchProgress { position: absolute; bottom: 0; left: 0; height: 8px; background: #00ccff; width: 0%; transition: width 1s linear; box-shadow: 0 0 15px #00ccff; z-index: 100; }

        /* RESZTA PANELU */
        .main-panel { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px var(--shadow); margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn { padding: 12px 25px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; font-size: 16px; }
        .btn-goal { background: #0044cc; color: white; }
        .btn-timer { background: #28a745; color: white; }
        .btn-reset { background: #dc3545; color: white; }

        .stats-container { display: flex; gap: 20px; margin-top: 30px; width: 100%; max-width: 950px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px var(--shadow); flex: 1; text-align: center; }
        .corner-box { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px 0; }
        .corner-val { background: #eee; padding: 5px 15px; border-radius: 5px; color: #000; min-width: 30px; font-weight: bold; }
        .btn-c { width: 30px; height: 30px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; color: white; }
        .plus { background: #28a745; } .minus { background: #dc3545; }
        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .card { width: 18px; height: 26px; border-radius: 3px; cursor: pointer; border: 1px solid rgba(0,0,0,0.2); opacity: 0.2; transition: 0.3s; }
        .y { background: #ffd700; } .r { background: #ff4d4d; }
        .card.active { opacity: 1; border: 2px solid white; }
        select { margin-top: 20px; padding: 10px; border-radius: 8px; border: 2px solid #0044cc; background: var(--card); color: var(--text); }
    </style>
</head>
<body>

    <div class="site-logo">
        <div class="q-box">Q</div>
        <div style="display: flex; flex-direction: column; line-height: 1.2;">
            <span style="font-weight: 900; font-size: 24px; color: #000f45;">ScoreBug</span>
            <span style="font-size: 13px; color: #0044cc; font-weight: bold; letter-spacing: 1px;">QUALIFIERS SYSTEM</span>
        </div>
    </div>

    <div class="bug-container">
        <div class="box team" contenteditable="true" spellcheck="false" id="t1n">SWE</div>
        <div class="box score" contenteditable="true" spellcheck="false" id="s1">0</div>
        <div class="box score" contenteditable="true" spellcheck="false" id="s2">0</div>
        <div class="box team" contenteditable="true" spellcheck="false" id="t2n">POL</div>
        <div class="box time" id="timerDisplay">00:00</div>
        <!-- PASEK POSTĘPU -->
        <div id="matchProgress"></div>
    </div>

    <div class="main-panel">
        <button class="btn btn-goal" onclick="addGoal(1)" id="btnG1">+1 GOL</button>
        <button class="btn btn-timer" onclick="toggleTimer()" id="btnStart">START / STOP</button>
        <button class="btn btn-goal" onclick="addGoal(2)" id="btnG2">+1 GOL</button>
        <button class="btn btn-reset" onclick="resetAll()">RESET</button>
        <button class="btn" style="background:#6c757d; color:white" onclick="document.body.classList.toggle('dark-mode')">🌙/☀️ MODE</button>
    </div>

    <select id="langPicker" onchange="updateUI()">
        <option value="pl">Polski 🇵🇱</option><option value="en">English 🇬🇧</option><option value="de">Deutsch 🇩🇪</option><option value="ru">Русский 🇷🇺</option>
    </select>

    <div class="stats-container">
        <div class="stat-card">
            <h3 id="t1l">SWE Statystyki</h3>
            <div class="corner-box">Rożne: <button class="btn-c minus" onclick="addC(1,-1)">-</button> <span class="corner-val" id="c1">0</span> <button class="btn-c plus" onclick="addC(1,1)">+</button></div>
            <div style="display:flex; gap:5px;"><input type="text" id="pi1" placeholder="Nazwisko..." style="flex:1; padding:8px;"><button onclick="addP(1)" class="btn plus" style="padding:5px 10px;">DODAJ</button></div>
            <div id="list1"></div>
        </div>
        <div class="stat-card">
            <h3 id="t2l">POL Statystyki</h3>
            <div class="corner-box">Rożne: <button class="btn-c minus" onclick="addC(2,-1)">-</button> <span class="corner-val" id="c2">0</span> <button class="btn-c plus" onclick="addC(2,1)">+</button></div>
            <div style="display:flex; gap:5px;"><input type="text" id="pi2" placeholder="Nazwisko..." style="flex:1; padding:8px;"><button onclick="addP(2)" class="btn plus" style="padding:5px 10px;">DODAJ</button></div>
            <div id="list2"></div>
        </div>
    </div>

    <script>
        let sec = 0; let timer = null;
        function updateUI() {
            document.getElementById('btnG1').innerText = `+1 GOL (${document.getElementById('t1n').innerText})`;
            document.getElementById('btnG2').innerText = `+1 GOL (${document.getElementById('t2n').innerText})`;
        }

        function addGoal(t) {
            let s = document.getElementById('s' + t);
            s.innerText = (parseInt(s.innerText) || 0) + 1;
            // Animacja błysku
            s.classList.add('goal-flash');
            setTimeout(() => s.classList.remove('goal-flash'), 400);
        }

        function addC(t, v) {
            let e = document.getElementById('c' + t);
            let cur = parseInt(e.innerText);
            if (cur + v >= 0) e.innerText = cur + v;
        }

        function addP(t) {
            let i = document.getElementById('pi' + t);
            if (!i.value) return;
            let l = document.getElementById('list' + t);
            let r = document.createElement('div');
            r.className = 'player-row';
            r.innerHTML = `<span>${i.value}</span><div style="display:flex; gap:5px;"><div class="card y" onclick="tc(this,'y')"></div><div class="card y" onclick="tc(this,'y')"></div><div class="card r" onclick="tc(this,'r')"></div><span onclick="this.parentElement.parentElement.remove()" style="cursor:pointer; color:red; margin-left:10px;">X</span></div>`;
            l.appendChild(r); i.value = "";
        }

        function tc(e, t) {
            e.classList.toggle('active');
            let p = e.parentElement;
            if (t === 'y' && p.querySelectorAll('.card.y.active').length >= 2) {
                p.querySelector('.card.r').classList.add('active');
                p.querySelectorAll('.card.y').forEach(y => { y.classList.remove('active'); y.style.display = 'none'; });
            }
            if (t === 'r' && !e.classList.contains('active')) {
                p.querySelectorAll('.card.y').forEach(y => y.style.display = 'block');
            }
        }

        function toggleTimer() {
            if (timer) { clearInterval(timer); timer = null; } 
            else {
                timer = setInterval(() => {
                    sec++;
                    let m = Math.floor(sec / 60).toString().padStart(2, '0');
                    let s = (sec % 60).toString().padStart(2, '0');
                    document.getElementById('timerDisplay').innerText = m + ":" + s;
                    // Pasek postępu (skala 90 min)
                    document.getElementById('matchProgress').style.width = Math.min((sec / 5400) * 100, 100) + "%";
                }, 1000);
            }
        }

        function resetAll() {
            sec = 0; document.getElementById('timerDisplay').innerText = "00:00";
            document.getElementById('matchProgress').style.width = "0%";
            document.getElementById('s1').innerText = "0"; document.getElementById('s2').innerText = "0";
            document.getElementById('c1').innerText = "0"; document.getElementById('c2').innerText = "0";
            document.getElementById('list1').innerHTML = ""; document.getElementById('list2').innerHTML = "";
            if (timer) { clearInterval(timer); timer = null; }
        }

        document.getElementById('t1n').addEventListener('input', updateUI);
        document.getElementById('t2n').addEventListener('input', updateUI);
    </script>
</body>
</html>

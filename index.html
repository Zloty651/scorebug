<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Scorebug Pro - Complete Match Center</title>
    <!-- IKONKA Q NA KARCIE -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://w3.org' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23000f45'/%3E%3Ctext y='.9em' x='50%25' font-size='70' font-weight='900' text-anchor='middle' fill='white' font-family='Arial'%3EQ%3C/text%3E%3C/svg%3E">
    
    <style>
        :root { --bg: #eef2f7; --card: white; --text: #000f45; --shadow: rgba(0,0,0,0.1); }
        body.dark-mode { --bg: #0b0e14; --card: #1a1e26; --text: #ffffff; --shadow: rgba(0,0,0,0.5); }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; transition: 0.3s; }
        
        .site-logo { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; background: var(--card); padding: 15px 25px; border-radius: 12px; box-shadow: 0 4px 15px var(--shadow); border-left: 6px solid #0044cc; }
        .q-box { width: 50px; height: 50px; background: #000f45; border-radius: 10px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; border: 2px solid #0044cc; }
        .q-text { color: white; font-weight: 900; font-size: 28px; z-index: 2; }
        .q-decor { position: absolute; bottom: -5px; right: -5px; width: 25px; height: 25px; background: #0044cc; transform: rotate(45deg); }

        #scorebug { display: flex; align-items: center; background: #000f45; color: white; width: fit-content; padding: 5px; border-bottom: 8px solid #0044cc; box-shadow: 0 10px 30px var(--shadow); font-size: 45px; border-radius: 4px; overflow: hidden; }
        .box { padding: 20px 35px; text-align: center; min-width: 90px; outline: none; white-space: nowrap; overflow: hidden; }
        .team { background: #001e8c; font-weight: bold; border-right: 2px solid #002db3; text-transform: uppercase; }
        .score { background: #ffffff; color: #000; font-weight: 900; min-width: 50px; border-left: 1px solid #ccc; height: 65px; display: flex; align-items: center; justify-content: center; }
        .time { background: #000a30; font-size: 40px; color: #fff; min-width: 130px; border-left: 2px solid #001e8c; }

        .main-panel { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px var(--shadow); margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn { padding: 12px 25px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; font-size: 16px; }
        .btn-goal { background: #0044cc; color: white; }
        .btn-timer { background: #28a745; color: white; }
        .btn-reset { background: #dc3545; color: white; }
        .btn-mode { background: #6c757d; color: white; }

        .stats-container { display: flex; gap: 20px; margin-top: 30px; width: 100%; max-width: 950px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px var(--shadow); flex: 1; text-align: center; }
        .player-list { margin-top: 15px; text-align: left; max-height: 250px; overflow-y: auto; padding: 10px; background: rgba(0,0,0,0.05); border-radius: 8px; }
        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid rgba(0,0,0,0.1); font-size: 15px; }
        .card-btn { width: 18px; height: 26px; border-radius: 3px; cursor: pointer; border: 1px solid rgba(0,0,0,0.2); }
        .yellow { background: #ffd700; }
        .red { background: #ff4d4d; }
        select { margin-top: 20px; padding: 12px; border-radius: 8px; border: 2px solid #0044cc; background: var(--card); color: var(--text); }
    </style>
</head>
<body>

    <div class="site-logo">
        <div class="q-box"><span class="q-text">Q</span><div class="q-decor"></div></div>
        <div style="display: flex; flex-direction: column; line-height: 1;">
            <span style="font-weight: 900; font-size: 24px; text-transform: uppercase;">Qualifiers</span>
            <span style="font-size: 13px; color: #0044cc; font-weight: bold; letter-spacing: 2px;">COMPLETE MATCH CENTER</span>
        </div>
    </div>

    <div id="scorebug">
        <div class="box team" contenteditable="true" spellcheck="false" id="t1n" oninput="updateUI()">SWE</div>
        <div class="box score" contenteditable="true" spellcheck="false" id="s1">3</div>
        <div class="box score" contenteditable="true" spellcheck="false" id="s2">2</div>
        <div class="box team" contenteditable="true" spellcheck="false" id="t2n" oninput="updateUI()">POL</div>
        <div class="box time" contenteditable="true" spellcheck="false" id="timerDisplay">00:00</div>
    </div>

    <div class="main-panel">
        <button class="btn btn-goal" onclick="addGoal(1)" id="btnG1">+1 GOL</button>
        <button class="btn btn-timer" onclick="toggleTimer()" id="btnStart">START / STOP</button>
        <button class="btn btn-goal" onclick="addGoal(2)" id="btnG2">+1 GOL</button>
        <button class="btn btn-reset" onclick="resetAll()" id="btnReset">RESET</button>
        <button class="btn btn-mode" onclick="toggleDarkMode()" id="btnMode">🌙 TRYB CIEMNY</button>
    </div>

    <select id="langPicker" onchange="updateUI()">
        <option value="pl">Polski 🇵🇱</option><option value="en">English 🇬🇧</option>
        <option value="de">Deutsch 🇩🇪</option><option value="es">Español 🇪🇸</option>
        <option value="it">Italiano 🇮🇹</option><option value="fr">Français 🇫🇷</option>
        <option value="ru">Русский 🇷🇺</option><option value="zh">中文 🇨🇳</option>
        <option value="ja">日本語 🇯🇵</option>
    </select>

    <div class="stats-container">
        <div class="stat-card">
            <h3 id="t1-label">SWE Statystyki</h3>
            <div class="player-list" id="list1"></div>
        </div>
        <div class="stat-card">
            <h3 id="t2-label">POL Statystyki</h3>
            <div class="player-list" id="list2"></div>
        </div>
    </div>

    <script>
        let seconds = 0; let timerInterval = null;
        const database = {
            "POL": ["Lewandowski", "Szczęsny", "Zieliński", "Kiwiór"],
            "SWE": ["Isak", "Kulusevski", "Gyökeres", "Lindelöf"],
            "GER": ["Musiala", "Wirtz", "Havertz", "Kimmich"],
            "ENG": ["Kane", "Bellingham", "Saka", "Foden"]
        };

        const translations = {
            pl: { start: "START / STOP", goal: "+1 GOL", reset: "RESET", modeDark: "🌙 TRYB CIEMNY", modeLight: "☀️ TRYB JASNY" },
            en: { start: "START / STOP", goal: "+1 GOAL", reset: "RESET", modeDark: "🌙 DARK MODE", modeLight: "☀️ LIGHT MODE" },
            de: { start: "START / STOP", goal: "+1 TOR", reset: "RESET", modeDark: "🌙 DUNKELMODUS", modeLight: "☀️ HELLER MODUS" },
            es: { start: "INICIAR / PARAR", goal: "+1 GOL", reset: "REINICIAR", modeDark: "🌙 MODO OSCURO", modeLight: "☀️ MODO CLARO" },
            it: { start: "INIZIA / FERMA", goal: "+1 GOL", reset: "RESET", modeDark: "🌙 MODO SCURO", modeLight: "☀️ MODO CHIARO" },
            fr: { start: "DÉMARRER / ARRÊTER", goal: "+1 BUT", reset: "RÉINITIALISER", modeDark: "🌙 MODE SOMBRE", modeLight: "☀️ MODE CLAIR" },
            ru: { start: "СТАРТ / СТОП", goal: "+1 ГОЛ", reset: "СБРОС", modeDark: "🌙 ТЕМНЫЙ РЕЖИМ", modeLight: "☀️ СВЕТЛЫЙ РЕЖИМ" },
            zh: { start: "开始 / 停止", goal: "+1 进球", reset: "重置", modeDark: "🌙 深色模式", modeLight: "☀️ 浅色模式" },
            ja: { start: "スタート / ストップ", goal: "+1 ゴール", reset: "リセット", modeDark: "🌙 ダークモード", modeLight: "☀️ ライトモード" }
        };

        function updateUI() {
            const lang = document.getElementById('langPicker').value;
            const isDark = document.body.classList.contains('dark-mode');
            const n1 = document.getElementById('t1n').innerText;
            const n2 = document.getElementById('t2n').innerText;

            document.getElementById('btnStart').innerText = translations[lang].start;
            document.getElementById('btnReset').innerText = translations[lang].reset;
            document.getElementById('btnMode').innerText = isDark ? translations[lang].modeLight : translations[lang].modeDark;
            document.getElementById('btnG1').innerText = `${translations[lang].goal} (${n1})`;
            document.getElementById('btnG2').innerText = `${translations[lang].goal} (${n2})`;
            
            updatePlayers(1, n1); updatePlayers(2, n2);
        }

        function updatePlayers(num, name) {
            const list = document.getElementById('list' + num);
            document.getElementById('t' + num + '-label').innerText = name + " Statystyki";
            const team = name.trim().toUpperCase();
            if (database[team]) {
                list.innerHTML = database[team].map(p => `<div class="player-row"><span>${p}</span><div style="display:flex; gap:5px;"><div class="card-btn yellow"></div><div class="card-btn red"></div></div></div>`).join('');
            } else { list.innerHTML = "Wpisz POL, SWE, GER lub ENG"; }
        }

        function addGoal(t) { let s = document.getElementById('s' + t); s.innerText = (parseInt(s.innerText) || 0) + 1; }
        function toggleTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } else { timerInterval = setInterval(() => { seconds++; let m = Math.floor(seconds/60).toString().padStart(2,'0'), s = (seconds%60).toString().padStart(2,'0'); document.getElementById('timerDisplay').innerText = m+":"+s; }, 1000); }}
        function resetAll() { seconds = 0; document.getElementById('timerDisplay').innerText = "00:00"; document.getElementById('s1').innerText = "0"; document.getElementById('s2').innerText = "0"; if(timerInterval) toggleTimer(); }
        function toggleDarkMode() { document.body.classList.toggle('dark-mode'); updateUI(); }

        document.querySelectorAll('[contenteditable]').forEach(el => {
            el.addEventListener('keydown', e => { if(e.key === 'Enter') { e.preventDefault(); el.blur(); }});
        });
        document.querySelectorAll('.score, .time').forEach(el => {
            el.addEventListener('keypress', e => { if(!/[0-9:]/.test(e.key)) e.preventDefault(); });
        });

        updateUI();
    </script>
</body>
</html>
